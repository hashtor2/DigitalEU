<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DigitalEU Companion</title>
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #030712;
      color: #f3f4f6;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 8px;
    }
    .title {
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin: 0;
    }
    .logo-flag {
      font-size: 18px;
    }
    .status-card {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.02);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col antialiased">

  <div className="p-4 space-y-4">
    <div className="flex items-center gap-2 mb-4">
      <span className="text-xl" aria-hidden="true">🇪🇺</span>
      <span className="font-extrabold text-sm tracking-tight text-white">
        DigitalEU<span className="text-sky-400">.me</span>
      </span>
    </div>

    <div className="space-y-3">
      <div className="bg-slate-900 border border-white/5 rounded-xl p-3.5 space-y-2">
        <h4 className="text-xs font-bold uppercase tracking-wider text-slate-400">Your Active Session</h4>
        <div id="session-info" class="text-xs space-y-1">
          <div className="flex justify-between">
            <span className="text-slate-500">Mode:</span>
            <span id="session-mode" className="font-semibold text-sky-400">Guest Mode</span>
          </div>
          <div className="flex justify-between">
            <span className="text-slate-500">Sync:</span>
            <span id="session-sync" className="text-slate-400 font-mono text-[10px]">Local storage</span>
          </div>
        </div>
      </div>

      <div className="bg-sky-500/5 border border-sky-400/20 rounded-xl p-4 space-y-2">
        <p className="text-xs font-bold text-sky-300 flex items-center gap-1.5">
          🧩 Extension Active
        </p>
        <p className="text-[11px] text-slate-400 leading-relaxed">
          This extension will automatically detect your registered services and help you autofill your new Proton/Tuta details on their settings pages!
        </p>
      </div>
    </div>
  </div>

  <footer className="mt-auto border-t border-white/5 py-3 text-center text-[10px] text-slate-500">
    Zero-Knowledge Storage 🇨🇭
  </footer>

  <script type="module" src="/src/popup.ts"></script>
</body>
</html>
