name: Daily EU Tech News Digest

on:
  schedule:
    # Run daily at 09:00 UTC (adjust timezone as needed)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  news-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -v requests feedparser python-dotenv google-genai

      - name: Test imports
        run: |
          python -c "import requests; print('✓ requests')"
          python -c "import feedparser; print('✓ feedparser')"
          python -c "from google import genai; print('✓ google-genai')"
          python -c "import os; print('✓ os'); print(f'Env vars: TELEGRAM_TOKEN={bool(os.environ.get(\"TELEGRAM_TOKEN\"))}, GEMINI_API_KEY={bool(os.environ.get(\"GEMINI_API_KEY\"))}')"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run news agent
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/news-agent.py
