name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avbryt eldre kjøringer på samme branch når ny push kommer.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sett opp Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer avhengigheter
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Bygg
        run: npm run build

      - name: Test
        run: npm test
